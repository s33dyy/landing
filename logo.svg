<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Central node -->
  <rect x="33" y="33" width="14" height="14" rx="3" fill="currentColor"/>
  <!-- Top-right node -->
  <rect x="55" y="12" width="13" height="13" rx="3" fill="currentColor"/>
  <!-- Mid-left node -->
  <rect x="24" y="26" width="13" height="13" rx="3" fill="currentColor"/>
  <!-- Right node -->
  <rect x="59" y="36" width="12" height="12" rx="3" fill="currentColor"/>
  <!-- Bottom-left node -->
  <rect x="22" y="52" width="13" height="13" rx="3" fill="currentColor"/>
  <!-- Bottom-mid node -->
  <rect x="41" y="55" width="12" height="12" rx="3" fill="currentColor"/>
  <!-- Far-left hollow node -->
  <rect x="8" y="44" width="11" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Connections -->
  <line x1="40" y1="33" x2="37" y2="26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="33" x2="62" y2="25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="40" x2="59" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="47" x2="35" y2="52" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="47" x2="44" y2="55" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="40" x2="19" y2="49" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- cross link top-right to right -->
  <line x1="62" y1="25" x2="63" y2="36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- cross link bottom to bottom-mid -->
  <line x1="35" y1="58" x2="41" y2="59" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- right to bottom -->
  <line x1="63" y1="48" x2="53" y2="58" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
</svg>
